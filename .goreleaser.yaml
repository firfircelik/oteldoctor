version: 2

before:
  hooks:
    - go mod tidy
    - go test -count=1 ./...

builds:
  - main: ./cmd/oteldoctor
    binary: oteldoctor
    ldflags:
      - -s -w
      - -X github.com/firfircelik/oteldoctor/internal/cli.version={{ .Version }}
      - -X github.com/firfircelik/oteldoctor/internal/cli.commit={{ .Commit }}
      - -X github.com/firfircelik/oteldoctor/internal/cli.date={{ .Date }}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "oteldoctor_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"

release:
  github:
    owner: firfircelik
    name: oteldoctor
