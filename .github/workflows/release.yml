name: release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Run tests
        run: go test -race -count=1 ./...
      - name: Build
        run: |
          GOOS=linux GOARCH=amd64 go build -o bin/oteldoctor-linux-amd64 ./cmd/oteldoctor
          GOOS=linux GOARCH=arm64 go build -o bin/oteldoctor-linux-arm64 ./cmd/oteldoctor
          GOOS=darwin GOARCH=amd64 go build -o bin/oteldoctor-darwin-amd64 ./cmd/oteldoctor
          GOOS=darwin GOARCH=arm64 go build -o bin/oteldoctor-darwin-arm64 ./cmd/oteldoctor
          GOOS=windows GOARCH=amd64 go build -o bin/oteldoctor-windows-amd64.exe ./cmd/oteldoctor
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: bin/*
          generate_release_notes: true
