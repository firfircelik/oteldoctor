receivers:
  otlp:
    tls:
      cert_file: /tls/cert.pem
    protocols:
      grpc:
        endpoint: "0.0.0.0:4317"

processors:
  resource:
    attributes:
      - key: service.name
        value: collector
        action: upsert
      - key: deployment.environment
        value: production
        action: upsert
      - key: service.version
        value: "1.0.0"
        action: upsert
  batch:
    timeout: 200ms
  memory_limiter:
    check_interval: 1s
    limit_mib: 512
  filter:
    error_mode: ignore

exporters:
  otlphttp:
    endpoint: "https://backend:4318"
    tls:
      insecure_skip_verify: true

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resource, batch, filter, memory_limiter]
      exporters: [otlphttp]
    metrics:
      receivers: [otlp]
      processors: []
      exporters: [otlphttp]
